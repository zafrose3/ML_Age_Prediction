name: Docker Build and Push

on:
  push:
    branches:
      - main

jobs:

  docker:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3

        with:
          username: ${{ secrets.zafreenamri }}
          password: ${{ secrets.Amrisha786* }}

      - name: Build Docker Image
        run: |
          docker build -t zafreenamri/age-prediction-app:latest .

      - name: Push Docker Image
        run: |
          docker push zafreenamri/age-prediction-app:latest